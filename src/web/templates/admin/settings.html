{% extends "admin/layout.html" %}

{% block content %}
{% if message %}
<div class="alert {% if 'error' in message.lower() or 'fail' in message.lower() %}alert--error{% else %}alert--success{% endif %}">
  {{ message }}
</div>
{% endif %}

<form action="/admin/api/settings" method="POST" class="settings-form">

  <!-- AI Models section -->
  <section class="section">
    <h2 class="section-title">AI Models</h2>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="default_model">Default Model</label>
        <input
          type="text"
          id="default_model"
          name="default_model"
          class="form-input"
          value="{{ config.default_model }}"
          placeholder="e.g. gpt-4o"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="outline_model">Outline Model</label>
        <input
          type="text"
          id="outline_model"
          name="outline_model"
          class="form-input"
          value="{{ config.outline_model }}"
          placeholder="e.g. gpt-4o"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="strategy_model">Strategy Model</label>
        <input
          type="text"
          id="strategy_model"
          name="strategy_model"
          class="form-input"
          value="{{ config.strategy_model }}"
          placeholder="e.g. gpt-4o"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="cover_model">Cover Model</label>
        <input
          type="text"
          id="cover_model"
          name="cover_model"
          class="form-input"
          value="{{ config.cover_model }}"
          placeholder="e.g. gpt-4o"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="qa_model">QA Model</label>
        <input
          type="text"
          id="qa_model"
          name="qa_model"
          class="form-input"
          value="{{ config.qa_model }}"
          placeholder="e.g. gpt-4o-mini"
        >
      </div>
    </div>
  </section>

  <!-- Token Budgets section -->
  <section class="section">
    <h2 class="section-title">Token Budgets</h2>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="tokens_intro">Intro Tokens</label>
        <input
          type="number"
          id="tokens_intro"
          name="tokens_intro"
          class="form-input"
          value="{{ config.tokens_intro }}"
          min="1"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="tokens_subchapter">Subchapter Tokens</label>
        <input
          type="number"
          id="tokens_subchapter"
          name="tokens_subchapter"
          class="form-input"
          value="{{ config.tokens_subchapter }}"
          min="1"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="tokens_outro">Outro Tokens</label>
        <input
          type="number"
          id="tokens_outro"
          name="tokens_outro"
          class="form-input"
          value="{{ config.tokens_outro }}"
          min="1"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="tokens_strategy">Strategy Tokens</label>
        <input
          type="number"
          id="tokens_strategy"
          name="tokens_strategy"
          class="form-input"
          value="{{ config.tokens_strategy }}"
          min="1"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="tokens_outline">Outline Tokens</label>
        <input
          type="number"
          id="tokens_outline"
          name="tokens_outline"
          class="form-input"
          value="{{ config.tokens_outline }}"
          min="1"
        >
      </div>
    </div>
  </section>

  <!-- QA Thresholds section -->
  <section class="section">
    <h2 class="section-title">QA Thresholds</h2>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="qa_word_count_tolerance">Word Count Tolerance</label>
        <input
          type="number"
          id="qa_word_count_tolerance"
          name="qa_word_count_tolerance"
          class="form-input"
          value="{{ config.qa_word_count_tolerance }}"
          step="0.01"
          min="0"
          max="1"
        >
        <span class="form-hint">Fraction, e.g. 0.20 = ±20%</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="min_chapter_words">Min Chapter Words</label>
        <input
          type="number"
          id="min_chapter_words"
          name="min_chapter_words"
          class="form-input"
          value="{{ config.min_chapter_words }}"
          min="1"
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="max_retry_attempts">Max Retry Attempts</label>
        <input
          type="number"
          id="max_retry_attempts"
          name="max_retry_attempts"
          class="form-input"
          value="{{ config.max_retry_attempts }}"
          min="0"
        >
      </div>
    </div>
  </section>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </div>

</form>
{% endblock %}
